<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Granny 2 - Optimized View</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
  }

  .container {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: black;
    position: relative;
  }

  iframe {
    position: absolute;
    top: -80px;        /* crop top UI */
    left: -40px;       /* crop left margin */
    width: calc(100% + 80px);
    height: calc(100% + 120px);
    border: none;
  }

  #fullscreen-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0, 255, 136, 0.8);
    color: black;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    z-index: 100;
    font-family: sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.2s;
  }

  #fullscreen-btn:hover {
    transform: scale(1.05);
    background: rgba(0, 255, 136, 1);
  }
</style>
</head>
<body>

<div class="container">
  <iframe 
    src="https://www.play-games.com/embed/granny-chapter-two.html"
    allow="autoplay; fullscreen; keyboard; gamepad; pointer-lock"
    allowfullscreen>
  </iframe>
</div>

<button id="fullscreen-btn" onclick="goFullscreen()">
  <span>⛶</span> Fullscreen
</button>

<script>
  function goFullscreen() {
    const elem = document.documentElement;
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
  }
</script>

</body>
</html>
